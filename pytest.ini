[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks, but not ultra-verbose.
addopts = -v --tb=short

# Treat warnings as errors during tests so we catch deprecations early.
filterwarnings =
    error
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:celery.*
