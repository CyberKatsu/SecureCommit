name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    # Design decision: we use pytest-asyncio with anyio so tests don't need
    # a real Postgres or Redis.  The settings fixture supplies fake credentials
    # and all external calls are mocked.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Provide stub values — tests mock all real external calls.
          GITHUB_WEBHOOK_SECRET: "ci-test-secret"
          GITHUB_TOKEN: "ghp_ci_stub"
          ANTHROPIC_API_KEY: "sk-ant-ci-stub"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost/test"
          DATABASE_URL_SYNC: "postgresql+psycopg2://test:test@localhost/test"
          REDIS_URL: "redis://localhost:6379/0"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/1"
        run: pytest

      - name: Upload coverage (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
